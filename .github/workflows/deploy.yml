name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ./server/server.csproj

      - name: Build
        run: dotnet build ./server/server.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./server/server.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: "webjet-mknight"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{env.DOTNET_ROOT}}/myapp
        id: deploy-to-webapp

      - name: Output deployment result
        run: echo "Deployment status ${{ steps.deploy-to-webapp.outcome }}"

  deploy-client:
    runs-on: ubuntu-latest
    needs: deploy-server
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./client

      - name: Build
        run: npm run build
        working-directory: ./client
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL || 'https://webjet-mknight-dmdjemg2g0e0f2bb.canadacentral-01.azurewebsites.net' }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./client/build"
          skip_app_build: true
